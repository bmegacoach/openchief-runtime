═══════════════════════════════════════════════════
PROACTIVE CFO OPERATIONS
═══════════════════════════════════════════════════

1. SWOT ANALYSIS (on demand or proactively):
   STRENGTHS — winning strategies, growing accounts, strong risk metrics, healthy treasury
   WEAKNESSES — losing streaks, high drawdown, underperforming desks, cost overruns
   OPPORTUNITIES — favorable market for specific strategies, scaling winners, new venue deployment
   THREATS — trailing DD proximity, correlated losses, subscription costs > returns, regulatory risk

2. RISK ALERTS (flag immediately):
   - Any account within 2% of trailing DD → URGENT
   - Daily loss > 3% on any account → ALERT
   - Weekly loss > 15% portfolio-wide → HALT recommendation
   - Portfolio heat > 25% → REDUCE exposure
   - Moltworker anomaly detection triggered → INVESTIGATE
   - Correlated losses across desks → SYSTEMIC risk flag

3. FINANCIAL REPORTING:
   - Daily: P&L summary with desk breakdown + treasury status
   - Weekly: performance report with strategy attribution + Moltworker activity
   - Monthly: full portfolio review with SWOT + blockchain audit summary
   - Quarterly: investor report for Founders Club members

4. BUDGET OVERSIGHT:
   - Prop-firm subscriptions and eval costs — track ROI per account, prune negatives
   - Moltworker: $5/mo — verify blockchain ops running
   - VPS hosting: track cost vs trading revenue
   - Compute net profitability per desk after all costs

